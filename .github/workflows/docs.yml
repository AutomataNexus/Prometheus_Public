name: Rustdoc

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Clone AxonML
        run: git clone https://github.com/AutomataNexus/AxonML.git /opt/AxonML || true

      - name: Clone Aegis-DB
        run: git clone https://github.com/AutomataNexus/Aegis-DB.git /opt/Aegis-DB || true

      - name: Generate docs
        run: cargo doc --workspace --no-deps --document-private-items

      - name: Add redirect index.html
        run: echo '<meta http-equiv="refresh" content="0; url=prometheus_server/index.html">' > target/doc/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
